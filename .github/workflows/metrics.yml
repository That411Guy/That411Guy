name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==============================================
  # CUSTOM CODE STATS - Our Own Analytics
  # ==============================================
  code-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: 📊 Generate Code Stats
        env:
          METRICS_TOKEN: ${{ secrets.METRICS_PAT }}
        run: python scripts/generate_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash generated outputs outside the repo so we can overlay them
          # onto a fresh origin/main on each retry (stats.json / code-stats.svg
          # are full-snapshot artifacts — always safe to overwrite).
          mkdir -p "$RUNNER_TEMP/metrics-out"
          cp code-stats.svg "$RUNNER_TEMP/metrics-out/code-stats.svg"
          cp stats.json     "$RUNNER_TEMP/metrics-out/stats.json"

          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            cp "$RUNNER_TEMP/metrics-out/code-stats.svg" code-stats.svg
            cp "$RUNNER_TEMP/metrics-out/stats.json"     stats.json

            git add code-stats.svg stats.json
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "📊 Update code statistics"
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, retrying with fresh origin/main..."
            sleep $((RANDOM % 5 + 1))
          done
          echo "Push failed after 5 attempts"
          exit 1

  # ==============================================
  # 3D CONTRIBUTION GRAPH - Isometric SVG
  # ==============================================
  profile-3d-contrib:
    needs: code-stats
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🎲 Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: That411Guy

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ ! -d profile-3d-contrib ]; then
            echo "No output generated"
            exit 0
          fi

          mkdir -p "$RUNNER_TEMP/3d-out"
          cp -r profile-3d-contrib/. "$RUNNER_TEMP/3d-out/"

          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            mkdir -p profile-3d-contrib
            cp -r "$RUNNER_TEMP/3d-out/." profile-3d-contrib/

            git add profile-3d-contrib
            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "🎲 Update 3D contribution graph"
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, retrying..."
            sleep $((RANDOM % 5 + 1))
          done
          echo "Push failed after 5 attempts"
          exit 1

  # ==============================================
  # RECENT ACTIVITY FEED - Writes into README
  # ==============================================
  activity-readme:
    needs: profile-3d-contrib
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🎯 Update activity in README
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_NAME: "github-actions[bot]"
          COMMIT_EMAIL: "github-actions[bot]@users.noreply.github.com"
          COMMIT_MSG: "🎯 Update recent activity"
          MAX_LINES: 10

  # ==============================================
  # WAKATIME WEEKLY BREAKDOWN - Writes into README
  # Requires WAKATIME_API_KEY secret. Skipped otherwise.
  # ==============================================
  waka-readme:
    needs: activity-readme
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ⏱️ Update WakaTime weekly stats
        if: ${{ env.WAKATIME_API_KEY != '' }}
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_PROFILE_VIEWS: "False"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "True"
          SHOW_EDITORS: "True"
          SHOW_TIMEZONE: "True"
          SHOW_PROJECTS: "True"
          SHOW_LINES_OF_CODE: "False"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_SHORT_INFO: "True"
          COMMIT_BY_ME: "True"
          COMMIT_USERNAME: "github-actions[bot]"
          COMMIT_EMAIL: "github-actions[bot]@users.noreply.github.com"
          COMMIT_MESSAGE: "⏱️ Update WakaTime weekly stats"

  # ==============================================
  # MAIN METRICS - Profile Overview + Habits + Extras
  # ==============================================
  github-metrics-main:
    needs: waka-readme
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 📊 Generate Main Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_PAT }}
          committer_token: ${{ secrets.METRICS_PAT }}
          committer_branch: main
          filename: github-metrics-main.svg
          user: That411Guy
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: America/Chicago
          config_display: large
          config_padding: 6%

          # CRITICAL: Include ALL repos (private + org + collaborator)
          repositories_forks: yes
          repositories_affiliations: owner, collaborator, organization_member
          repositories_skipped: ""

          # Lines of code (all repos)
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 100
          plugin_lines_sections: base

          # Coding habits
          plugin_habits: yes
          plugin_habits_from: 1000
          plugin_habits_days: 30
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic
          plugin_habits_trim: yes

          # Follow up stats
          plugin_followup: yes
          plugin_followup_archived: yes
          plugin_followup_sections: repositories, user
          plugin_followup_indepth: yes

          # GitHub-wide achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0

          # Isometric calendar heatmap
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Deep language breakdown (bytes + percentages)
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # Most-used topics across repos
          plugin_topics: yes
          plugin_topics_mode: mastered
          plugin_topics_limit: 15

          # Stargazer history chart
          plugin_stargazers: yes
          plugin_stargazers_charts_type: classic

  # ==============================================
  # SNAKE - Contribution Animation
  # ==============================================
  github-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🐍 Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: That411Guy
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
